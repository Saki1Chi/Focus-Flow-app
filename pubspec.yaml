name: calendario
description: "FocusFlow - Smart Task Reminder & App Blocker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive_flutter: ^1.1.0

  # Notifications & Alarms
  flutter_local_notifications: ^17.2.4
  android_alarm_manager_plus: ^5.0.0

  # Calendar UI
  table_calendar: ^3.1.2

  # Permissions
  permission_handler: ^11.3.1


  # Date formatting
  intl: ^0.20.1

  # Animations
  animate_do: ^3.3.4

  # Unique IDs
  uuid: ^4.5.1

  # Shared prefs (for Kotlin service communication)
  shared_preferences: ^2.3.3

  # HTTP client for CMS backend communication
  http: ^1.2.2

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
