databases:
  - name: focusflow-db
    databaseName: focusflow
    user: focusflow
    plan: free

services:
  - type: web
    name: focusflow-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: focusflow-db
          property: connectionString
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
